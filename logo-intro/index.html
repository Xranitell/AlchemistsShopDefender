<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0a14" />
    <title>Alchemist's Shop: Rune Defense — Logo</title>

    <link rel="icon" href="../public/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-deep: #160c10;
        --bg-mid: #0c0712;
        --bg-low: #14070a;
        --gold: #ffd166;
        --orange: #ff6a3d;
        --rim: rgba(210, 79, 28, 0.5);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 50% 38%, rgba(210, 79, 28, 0.22) 0%, transparent 62%),
          linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 60%, var(--bg-low) 100%);
        color: #f0e3c8;
        font-family: 'Press Start 2P', 'VT323', system-ui, monospace;
        -webkit-font-smoothing: none;
        font-smooth: never;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        cursor: pointer;
      }

      /* Decorative pixel-art corners (match in-game loader) */
      body::before,
      body::after {
        content: '';
        position: fixed;
        width: 14px;
        height: 14px;
        background: linear-gradient(135deg, var(--orange) 50%, transparent 50%);
        pointer-events: none;
        opacity: 0;
        animation: corner-fade 600ms ease-out 1100ms forwards;
      }
      body::before { top: 14px; left: 14px; }
      body::after  {
        bottom: 14px;
        right: 14px;
        background: linear-gradient(-45deg, var(--orange) 50%, transparent 50%);
      }
      @keyframes corner-fade { to { opacity: 1; } }

      /* ─── Logo ─────────────────────────────────────────────── */
      .logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        text-align: center;
        padding: 24px;
        filter: drop-shadow(0 6px 0 rgba(0, 0, 0, 0.45));
        transform-origin: 50% 50%;

        /* Sharp scale-up with damped-spring settling.
         * Phase 1 (0-32%):  slam — scale(0) ➜ scale(1.28) very fast.
         * Phase 2 (32-100%): damped oscillation ➜ resting scale(1).
         * The amplitude decays 1.28 → 0.93 → 1.06 → 0.97 → 1.01 → 1 */
        animation:
          logo-slam 1100ms cubic-bezier(0.22, 1, 0.36, 1) 120ms backwards,
          logo-breath 4s ease-in-out 1300ms infinite;
        will-change: transform, filter;
      }

      @keyframes logo-slam {
        0%   { transform: scale(0);    opacity: 0; filter: drop-shadow(0 0 0 transparent); }
        18%  { opacity: 1; }
        32%  { transform: scale(1.28); opacity: 1;
               filter: drop-shadow(0 6px 0 rgba(0,0,0,0.45)) drop-shadow(0 0 38px rgba(255, 180, 90, 0.95)); }
        46%  { transform: scale(0.93); }
        60%  { transform: scale(1.06); }
        72%  { transform: scale(0.97); }
        84%  { transform: scale(1.015); }
        92%  { transform: scale(0.995); }
        100% { transform: scale(1);
               filter: drop-shadow(0 6px 0 rgba(0,0,0,0.45)); }
      }

      /* Subtle ambient breathing once the slam settles. */
      @keyframes logo-breath {
        0%, 100% { filter: drop-shadow(0 6px 0 rgba(0,0,0,0.45)) drop-shadow(0 0 4px rgba(255,140,60,0.0)); }
        50%      { filter: drop-shadow(0 6px 0 rgba(0,0,0,0.45)) drop-shadow(0 0 22px rgba(255,170,80,0.55)); }
      }

      .logo-glyph {
        font-size: clamp(28px, 5vw, 56px);
        color: var(--gold);
        line-height: 1;
        margin-bottom: 4px;
        text-shadow:
          -2px -2px 0 #5a2a15, 2px -2px 0 #5a2a15,
          -2px 2px 0 #5a2a15, 3px 3px 0 #5a2a15,
          0 0 16px rgba(255, 209, 102, 0.5);
      }

      .logo-top {
        font-size: clamp(16px, 2.6vw, 34px);
        color: var(--gold);
        letter-spacing: 2px;
        text-shadow:
          -2px -2px 0 #5a2a15, 2px -2px 0 #5a2a15,
          -2px 2px 0 #5a2a15, 3px 3px 0 #5a2a15,
          0 0 12px rgba(255, 209, 102, 0.45);
      }

      .logo-rule {
        width: min(70%, 360px);
        height: 4px;
        background: linear-gradient(90deg, transparent 0%, var(--rim) 20%, var(--rim) 80%, transparent 100%);
        margin: 4px 0 6px;
      }

      .logo-bottom {
        font-size: clamp(20px, 3.2vw, 44px);
        color: var(--orange);
        letter-spacing: 3px;
        text-shadow:
          -2px -2px 0 #3a1212, 2px -2px 0 #3a1212,
          -2px 2px 0 #3a1212, 3px 3px 0 #3a1212,
          0 0 14px rgba(255, 106, 61, 0.55);
      }

      /* Shockwave ring that pulses out at the moment of impact (~32%). */
      .logo::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 60px;
        height: 60px;
        border: 3px solid rgba(255, 180, 90, 0.85);
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        pointer-events: none;
        animation: logo-shock 900ms ease-out 470ms backwards;
      }
      @keyframes logo-shock {
        0%   { transform: translate(-50%, -50%) scale(0);    opacity: 0; }
        15%  { opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(14);   opacity: 0; border-width: 1px; }
      }

      .logo {
        position: relative;
      }

      /* Replay hint, fades in after the slam. */
      .replay-hint {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'VT323', monospace;
        font-size: clamp(14px, 1.8vw, 20px);
        color: rgba(240, 227, 200, 0.55);
        letter-spacing: 2px;
        opacity: 0;
        animation: hint-fade 600ms ease-out 1900ms forwards;
        pointer-events: none;
        user-select: none;
      }
      @keyframes hint-fade { to { opacity: 1; } }

      /* Reduced motion — skip the impact, just fade in. */
      @media (prefers-reduced-motion: reduce) {
        .logo {
          animation: logo-fade 500ms ease-out backwards;
        }
        .logo::before { display: none; }
        @keyframes logo-fade {
          from { opacity: 0; transform: scale(0.96); }
          to   { opacity: 1; transform: scale(1); }
        }
      }
    </style>
  </head>
  <body>
    <div class="logo" id="logo" aria-label="Alchemist's Shop: Rune Defense">
      <span class="logo-glyph" aria-hidden="true">☿</span>
      <span class="logo-top">Лавка алхимика:</span>
      <span class="logo-rule" aria-hidden="true"></span>
      <span class="logo-bottom">рунная оборона</span>
    </div>

    <span class="replay-hint">click to replay</span>

    <script>
      // Click anywhere to replay the slam animation — handy for tweaking /
      // capturing a clean GIF without reloading the whole page.
      const logo = document.getElementById('logo');
      document.body.addEventListener('click', () => {
        // Restart both the slam and the shockwave by reflowing the node.
        logo.style.animation = 'none';
        // eslint-disable-next-line no-unused-expressions
        logo.offsetHeight;
        logo.style.animation = '';
      });
    </script>
  </body>
</html>
