<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0a14" />
    <title>Alchemist's Shop Defender</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <!-- Yandex Games SDK. The script is hosted on Yandex CDN and is no-op in
         non-Yandex environments. Our wrapper falls back to a stub. -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
  </head>
  <body>
    <!-- Portrait-orientation warning for mobile — hidden by default,
         revealed by CSS when the device is in portrait mode. -->
    <div id="portrait-warning">
      <span class="rotate-icon">📱</span>
      <span data-i18n="ui.rotate">Поверните устройство горизонтально</span>
      <span data-i18n="ui.rotate.sub" style="font-size:20px;color:rgba(240,227,200,0.55);">Rotate your device to landscape</span>
    </div>

    <div id="app">
      <canvas id="game-canvas" width="1280" height="720"></canvas>
      <div id="hud"></div>
      <div id="overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
